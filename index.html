<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Rajarajeshwari & Padalingam Wedding Invitation
  </title>

  <!-- GOOGLE FONTS -->

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  >

  <!-- CSS -->

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- ========================= -->
  <!-- FLOATING PETALS -->
  <!-- ========================= -->

  <div class="petals">

    <span class="petal"></span>
    <span class="petal"></span>
    <span class="petal"></span>
    <span class="petal"></span>

  </div>

  <!-- ========================= -->
  <!-- MUSIC -->
  <!-- ========================= -->

  <audio id="bgMusic" loop>
    <source
      src="music/Neeyum Nanum bgm.mp3"
      type="audio/mp3"
    >
  </audio>

  <button
    class="music-btn"
    id="musicToggle"
  >
    ♫ Music
  </button>

  <!-- ========================= -->
  <!-- OPENING SCREEN -->
  <!-- ========================= -->

  <section
    class="opening-screen"
    id="openingScreen"
  >

    <!-- Overlay -->

    <div class="opening-overlay"></div>

    <!-- Tamil Corner Decorations -->

    <div class="corner-decoration top-left"></div>
    <div class="corner-decoration top-right"></div>
    <div class="corner-decoration bottom-left"></div>
    <div class="corner-decoration bottom-right"></div>

    <!-- Content -->

    <div class="opening-content">

      <!-- Minimal Sacred Divider -->

      <div class="sacred-divider"></div>

      <p class="invited-text">
        YOU ARE INVITED
      </p>

      <h1 class="couple-names">
        Padalingam
        <span>&</span>
        Rajarajeshwari
      </h1>

      <p class="opening-description">
        Together with their families,<br>
        warmly invite you to celebrate<br>
        their wedding ceremony.
      </p>

      <button
        class="open-btn"
        id="openInvitation"
      >
        Open Invitation
      </button>

      <div class="opening-footer">

        <p>
          07 June 2026
        </p>

        <span></span>

        <p>
          Sivakasi
        </p>

      </div>

    </div>

  </section>

  <!-- MAIN JS -->

  <script src="script.js"></script>

</body>

</html>
